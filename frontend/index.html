<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>IA Local</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="chat-container">
    <div id="chatBox"></div>

    <div class="input-area">
      <input 
        type="text" 
        id="messageInput" 
        placeholder="Digite sua mensagem..."
        onkeypress="if(event.key==='Enter') sendMessage()"
      />
      <button id="sendButton" onclick="sendMessage()">Enviar</button>
    </div>
  </div>

  <script>
    async function sendMessage() {
      const input = document.getElementById("messageInput");
      const chatBox = document.getElementById("chatBox");
      const button = document.getElementById("sendButton");

      const message = input.value.trim();
      if (!message) return;

      // Mostra mensagem do usuário imediatamente
      chatBox.innerHTML += `<div class="message user">${message}</div>`;
      input.value = "";
      chatBox.scrollTop = chatBox.scrollHeight;

      // Criar ID único para loading
      const loadingId = "loading-" + Date.now();

      // Mostra indicador "Pensando..."
      chatBox.innerHTML += `<div class="message ai typing" id="${loadingId}">Pensando</div>`;
      chatBox.scrollTop = chatBox.scrollHeight;

      button.disabled = true;

      try {
        const response = await fetch("http://127.0.0.1:8000/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message })
        });

        const data = await response.json();

        // Remove loading
        const loadingElement = document.getElementById(loadingId);
        if (loadingElement) loadingElement.remove();

        // Adiciona resposta da IA
        chatBox.innerHTML += `<div class="message ai">${data.response}</div>`;

      } catch (error) {
        const loadingElement = document.getElementById(loadingId);
        if (loadingElement) {
          loadingElement.innerText = "Erro ao conectar com a IA.";
          loadingElement.classList.remove("typing");
        }
      }

      button.disabled = false;
      chatBox.scrollTop = chatBox.scrollHeight;
    }
  </script>

</body>
</html>
